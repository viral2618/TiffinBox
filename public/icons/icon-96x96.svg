<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <!-- Tiffin box body -->
  <rect x="22" y="42" width="52" height="30" rx="6" fill="white" opacity="0.95"/>
  <!-- Tiffin box lid -->
  <rect x="22" y="34" width="52" height="12" rx="5" fill="white" opacity="0.85"/>
  <!-- Lid handle -->
  <rect x="38" y="28" width="20" height="8" rx="4" fill="white" opacity="0.7"/>
  <!-- Steam wisps -->
  <path d="M36 26 Q33 20 36 15" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M48 26 Q45 20 48 15" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M60 26 Q57 20 60 15" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Saffron accent dot on lid -->
  <circle cx="48" cy="40" r="4" fill="url(#accent)"/>
  <!-- TL text in body -->
  <text x="48" y="61" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#0d9488" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">TL</text>
</svg>
